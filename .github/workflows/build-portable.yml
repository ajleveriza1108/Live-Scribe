name: Build Portable Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact: windows-x64
          - os: ubuntu-22.04
            artifact: linux-x64
          - os: macos-15
            artifact: macos-apple-silicon
          - os: macos-15-intel
            artifact: macos-intel

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Linux audio library
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 portaudio19-dev

      - name: Install build dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-build.txt

      - name: Build and test portable package
        run: python scripts/build_portable.py

      - name: Upload portable archives
        uses: actions/upload-artifact@v4
        with:
          name: live-scribe-${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download all portable archives
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Live Scribe ${GITHUB_REF_NAME}" \
            --generate-notes
