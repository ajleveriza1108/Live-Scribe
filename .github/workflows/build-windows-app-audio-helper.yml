name: Build Windows selected-app audio helper

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-windows-app-audio-helper.yml"

permissions:
  contents: write

jobs:
  build-helper:
    runs-on: windows-latest
    steps:
      - name: Check out Live Scribe
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out Microsoft's ApplicationLoopback sample
        uses: actions/checkout@v4
        with:
          repository: microsoft/Windows-classic-samples
          path: vendor/windows-classic-samples
          sparse-checkout: Samples/ApplicationLoopback
          sparse-checkout-cone-mode: false

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore sample packages
        shell: pwsh
        run: |
          nuget restore "vendor/windows-classic-samples/Samples/ApplicationLoopback/cpp/ApplicationLoopback.sln"

      - name: Permit Live Scribe to read the growing WAV
        shell: pwsh
        run: |
          $source = "vendor/windows-classic-samples/Samples/ApplicationLoopback/cpp/LoopbackCapture.cpp"
          $content = Get-Content $source -Raw
          $old = "CreateFile(m_outputFileName, GENERIC_WRITE, 0, NULL"
          $new = "CreateFile(m_outputFileName, GENERIC_WRITE, FILE_SHARE_READ, NULL"
          if (-not $content.Contains($old)) {
            throw "The expected Microsoft sample line was not found."
          }
          Set-Content $source ($content.Replace($old, $new)) -Encoding UTF8

      - name: Build x64 Release helper
        shell: pwsh
        run: |
          msbuild "vendor/windows-classic-samples/Samples/ApplicationLoopback/cpp/ApplicationLoopback.sln" `
            /m /p:Configuration=Release /p:Platform=x64

      - name: Install helper into Live Scribe
        shell: pwsh
        run: |
          $exe = Get-ChildItem `
            "vendor/windows-classic-samples/Samples/ApplicationLoopback/cpp" `
            -Recurse -Filter "ApplicationLoopback.exe" |
            Where-Object { $_.FullName -match "x64.*Release|Release.*x64" } |
            Select-Object -First 1
          if (-not $exe) {
            throw "ApplicationLoopback.exe was not produced."
          }
          New-Item "engines/windows" -ItemType Directory -Force | Out-Null
          Copy-Item $exe.FullName `
            "engines/windows/LiveScribeApplicationLoopback.exe" -Force

      - name: Commit helper to this repository
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "engines/windows/LiveScribeApplicationLoopback.exe"
          if (git diff --cached --quiet) {
            Write-Host "Helper is already current."
            exit 0
          }
          git commit -m "Build Windows selected-app audio helper [skip ci]"
          git push
